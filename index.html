<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KHOKAI Partner POS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f6f4ef;--card:#fff;--ink:#221f1a;--muted:#7b7469;--brand:#b88746;--dark:#111;--ok:#117a4a;--bad:#b42318;--line:#e7dfd3}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
    header{position:sticky;top:0;z-index:3;background:#111;color:white;padding:14px 16px;box-shadow:0 2px 12px #0002}
    h1{margin:0;font-size:18px}.sub{font-size:12px;color:#d8d0c6;margin-top:2px}.wrap{max-width:980px;margin:auto;padding:14px}
    .tabs{display:flex;gap:8px;overflow:auto;padding:10px 0}.tab{border:0;border-radius:999px;background:#e9e0d2;padding:10px 14px;font-weight:800;white-space:nowrap}.tab.active{background:var(--dark);color:white}
    .grid{display:grid;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 1px 8px #0000000a}
    label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:8px 0 5px} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:white;font-size:16px} textarea{min-height:80px}
    button{cursor:pointer}.btn{width:100%;border:0;border-radius:14px;padding:13px;font-size:16px;font-weight:900;background:var(--brand);color:white}.btn.dark{background:#111}.btn.ghost{background:white;color:#111;border:1px solid var(--line)}.btn.bad{background:var(--bad)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.money{font-variant-numeric:tabular-nums;font-weight:900}.muted{color:var(--muted);font-size:13px}.pill{display:inline-block;border-radius:999px;padding:5px 9px;background:#f0e7d8;font-size:12px;font-weight:900}.pill.ok{background:#dff5e7;color:#12613d}.pill.bad{background:#ffe0dc;color:#b42318}
    table{width:100%;border-collapse:collapse;font-size:14px} th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left} th{color:var(--muted);font-size:12px}.right{text-align:right}.hide{display:none!important}
    .item{display:flex;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.big{font-size:26px;font-weight:950}.status{display:flex;gap:6px;flex-wrap:wrap}.status button{border:1px solid var(--line);background:white;border-radius:999px;padding:8px 10px;font-weight:800}.status button.on{background:#111;color:white}
    @media(min-width:760px){.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:repeat(3,1fr)}.btn{width:auto}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions .btn{flex:1}}
  </style>
</head>
<body>
<header><h1>KHOKAI Partner POS</h1><div class="sub">ระบบขายส่ง Partner · Mobile First · Supabase Ready</div></header>
<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <main id="app"></main>
</div>
<script>
const DB={products:'khokai_products',partners:'khokai_partners',orders:'khokai_partner_orders'};
const PRICE_LABEL={retail:'ปลีก',restaurant:'ร้านอาหาร',mart:'มาร์ท',wholesale:'ยี่ปั๊ว'};
const ORDER_STATUS=['เปิด','รอชำระ','ชำระแล้ว','กำลังแพ็ค','พร้อมส่ง','ส่งแล้ว','ปิดงาน'];
let state={tab:'order',products:[],partners:[],orders:[],cart:[],sb:null,config:{url:localStorage.sb_url||'',key:localStorage.sb_key||''}};
const seedProducts=[
 {sku:'PB-1KG',name_th:'ลูกชิ้นหมูพรีเมียม',name_kr:'돼지볼 커카이',weight_g:1000,retail:14900,restaurant:13500,mart:13000,wholesale:12500,stock:0,option_id:'',display_product_id:''},
 {sku:'PB-700G',name_th:'ลูกชิ้นหมูพรีเมียม',name_kr:'돼지볼 커카이',weight_g:700,retail:11200,restaurant:10200,mart:9800,wholesale:9500,stock:0,option_id:'',display_product_id:''},
 {sku:'PB-280G',name_th:'ลูกชิ้นหมูพรีเมียม',name_kr:'돼지볼 커카이',weight_g:280,retail:5000,restaurant:4600,mart:4400,wholesale:4200,stock:0,option_id:'',display_product_id:''},
 {sku:'PC-1KG',name_th:'ลูกชิ้นหมู+ไก่',name_kr:'미트볼 커카이(제2호)',weight_g:1000,retail:12000,restaurant:11000,mart:10500,wholesale:10000,stock:0,option_id:'',display_product_id:''},
 {sku:'CT-1KG',name_th:'ลูกชิ้นเอ็นไก่',name_kr:'미트볼 커카이 3호',weight_g:1000,retail:12000,restaurant:11000,mart:10500,wholesale:10000,stock:0,option_id:'',display_product_id:''},
 {sku:'YB-700G',name_th:'หมูยอ',name_kr:'여우본',weight_g:700,retail:10000,restaurant:9200,mart:8800,wholesale:8500,stock:0,option_id:'',display_product_id:''}
];
const seedPartners=[{name:'ตัวอย่าง ร้านอาหาร',contact:'',phone:'',address:'',price_group:'restaurant',route_day:'อังคาร',credit_limit:0,seller:'admin'}];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function money(n){return Number(n||0).toLocaleString('ko-KR')+'원'}
function saveLocal(){['products','partners','orders'].forEach(k=>localStorage['kp_'+k]=JSON.stringify(state[k]))}
function loadLocal(){state.products=JSON.parse(localStorage.kp_products||'null')||seedProducts.map(x=>({...x,id:uid()}));state.partners=JSON.parse(localStorage.kp_partners||'null')||seedPartners.map(x=>({...x,id:uid()}));state.orders=JSON.parse(localStorage.kp_orders||'[]')}
function initSupabase(){if(state.config.url&&state.config.key&&window.supabase){state.sb=window.supabase.createClient(state.config.url,state.config.key)}else state.sb=null}
async function syncLoad(){loadLocal();initSupabase(); if(!state.sb) return; try{for(const k of ['products','partners','orders']){const {data,error}=await state.sb.from(DB[k]).select('*').order('created_at',{ascending:false}); if(!error&&data) state[k]=data} saveLocal()}catch(e){console.warn(e)}}
async function upsert(table,row){row.updated_at=new Date().toISOString(); if(!row.id) row.id=uid(); if(state.sb){try{await state.sb.from(DB[table]).upsert(row)}catch(e){console.warn(e)}} const arr=state[table]; const i=arr.findIndex(x=>x.id===row.id); if(i>=0) arr[i]=row; else arr.unshift(row); saveLocal(); render()}
async function del(table,id){if(!confirm('ลบรายการนี้?'))return; if(state.sb){try{await state.sb.from(DB[table]).delete().eq('id',id)}catch(e){console.warn(e)}} state[table]=state[table].filter(x=>x.id!==id); saveLocal(); render()}
function tabs(){const list=[['order','เปิดบิล'],['orders','ออเดอร์'],['pick','ใบหยิบ'],['partners','Partner'],['products','สินค้า'],['dash','Dashboard'],['settings','ตั้งค่า']];document.getElementById('tabs').innerHTML=list.map(([id,t])=>`<button class="tab ${state.tab===id?'active':''}" onclick="state.tab='${id}';render()">${t}</button>`).join('')}
function render(){tabs(); const fn={order,orders,pick,partners,products,dash,settings}[state.tab]; document.getElementById('app').innerHTML=fn()}
function order(){const p=state.partners[0]||{}; const partnerId=localStorage.current_partner||p.id||''; const partner=state.partners.find(x=>x.id===partnerId)||p; const group=partner.price_group||'restaurant'; const total=state.cart.reduce((s,i)=>s+i.qty*i.price,0); return `<div class="grid two"><section class="card"><label>เลือกร้าน</label><select onchange="localStorage.current_partner=this.value;state.cart=[];render()">${state.partners.map(x=>`<option value="${x.id}" ${x.id===partnerId?'selected':''}>${x.name} · ${PRICE_LABEL[x.price_group]||x.price_group}</option>`).join('')}</select><label>สินค้า</label>${state.products.map(x=>`<div class="item"><div><b>${x.name_th}</b><div class="muted">${x.sku} · ${x.name_kr} · ${x.weight_g}g</div><div class="money">${money(x[group])}</div></div><button class="btn ghost" onclick="addCart('${x.id}')">+ เพิ่ม</button></div>`).join('')}</section><section class="card"><div class="muted">บิลของ</div><div class="big">${partner.name||'-'}</div>${state.cart.length?state.cart.map((i,idx)=>`<div class="item"><div><b>${i.name_th}</b><div class="muted">${money(i.price)} x <input style="width:80px;padding:6px" type="number" value="${i.qty}" onchange="state.cart[${idx}].qty=Number(this.value||1);render()"></div></div><div class="right"><div class="money">${money(i.price*i.qty)}</div><button onclick="state.cart.splice(${idx},1);render()">ลบ</button></div></div>`).join(''):'<p class="muted">ยังไม่มีสินค้า</p>'}<hr><div class="item"><b>รวม</b><b class="big">${money(total)}</b></div><label>หมายเหตุ</label><textarea id="note" placeholder="เช่น ส่งพร้อมของรอบวันอังคาร"></textarea><div class="actions"><button class="btn dark" onclick="saveOrder()">บันทึกออเดอร์</button><button class="btn ghost" onclick="state.cart=[];render()">ล้าง</button></div></section></div>`}
function addCart(id){const product=state.products.find(x=>x.id===id); const partner=state.partners.find(x=>x.id===(localStorage.current_partner||''))||state.partners[0]||{}; const group=partner.price_group||'restaurant'; const found=state.cart.find(x=>x.product_id===id); if(found) found.qty++; else state.cart.push({product_id:id,sku:product.sku,name_th:product.name_th,name_kr:product.name_kr,qty:1,price:Number(product[group]||0)}); render()}
async function saveOrder(){if(!state.cart.length)return alert('ยังไม่มีสินค้า'); const partner=state.partners.find(x=>x.id===(localStorage.current_partner||''))||state.partners[0]; if(!partner)return alert('ยังไม่มี Partner'); const order={id:uid(),order_no:'P'+new Date().toISOString().slice(2,10).replaceAll('-','')+'-'+String(state.orders.length+1).padStart(4,'0'),partner_id:partner.id,partner_name:partner.name,price_group:partner.price_group,status:'เปิด',items:state.cart,total:state.cart.reduce((s,i)=>s+i.qty*i.price,0),note:document.getElementById('note').value||'',created_at:new Date().toISOString()}; state.cart=[]; await upsert('orders',order); state.tab='orders';render()}
function orders(){return `<section class="card"><h2>ออเดอร์</h2>${state.orders.map(o=>`<div class="item"><div><b>${o.order_no}</b> <span class="pill">${o.status}</span><div>${o.partner_name}</div><div class="muted">${new Date(o.created_at).toLocaleString('th-TH')} · ${o.items?.length||0} รายการ</div><div class="status">${ORDER_STATUS.map(s=>`<button class="${o.status===s?'on':''}" onclick="setStatus('${o.id}','${s}')">${s}</button>`).join('')}</div></div><div class="right"><div class="big">${money(o.total)}</div><button onclick="printInvoice('${o.id}')">ใบส่งของ</button></div></div>`).join('')||'<p class="muted">ยังไม่มีออเดอร์</p>'}</section>`}
async function setStatus(id,status){const o=state.orders.find(x=>x.id===id); if(!o)return; o.status=status; await upsert('orders',o)}
function pick(){const active=state.orders.filter(o=>!['ปิดงาน'].includes(o.status)); const sum={}; active.forEach(o=>(o.items||[]).forEach(i=>{sum[i.sku]=sum[i.sku]||{name:i.name_th,sku:i.sku,qty:0};sum[i.sku].qty+=Number(i.qty)})); return `<section class="card"><h2>ใบหยิบของรวม</h2><div class="muted">ออเดอร์ที่ยังไม่ปิดงาน</div><table><thead><tr><th>สินค้า</th><th class="right">จำนวน</th></tr></thead><tbody>${Object.values(sum).map(i=>`<tr><td><b>${i.name}</b><div class="muted">${i.sku}</div></td><td class="right big">${i.qty}</td></tr>`).join('')}</tbody></table><br><button class="btn dark" onclick="window.print()">พิมพ์</button></section>`}
function partners(){return `<div class="grid two"><section class="card"><h2>เพิ่ม Partner</h2>${partnerForm({})}</section><section class="card"><h2>รายชื่อ Partner</h2>${state.partners.map(x=>`<div class="item"><div><b>${x.name}</b><div class="muted">${PRICE_LABEL[x.price_group]} · ส่ง ${x.route_day||'-'} · ${x.phone||''}</div></div><button onclick="del('partners','${x.id}')">ลบ</button></div>`).join('')}</section></div>`}
function partnerForm(x){return `<label>ชื่อร้าน</label><input id="p_name"><div class="row"><div><label>กลุ่มราคา</label><select id="p_group"><option value="restaurant">ร้านอาหาร</option><option value="mart">มาร์ท</option><option value="wholesale">ยี่ปั๊ว</option><option value="retail">ปลีก</option></select></div><div><label>วันส่ง</label><input id="p_day" placeholder="อังคาร"></div></div><label>โทร</label><input id="p_phone"><label>ที่อยู่</label><textarea id="p_address"></textarea><button class="btn dark" onclick="addPartner()">บันทึก Partner</button>`}
async function addPartner(){await upsert('partners',{id:uid(),name:val('p_name'),price_group:val('p_group'),route_day:val('p_day'),phone:val('p_phone'),address:val('p_address'),created_at:new Date().toISOString()})}
function products(){return `<div class="grid"><section class="card"><h2>Product Master</h2><div class="muted">สินค้าเดียว ใช้ร่วม Mini POS / Partner POS / Export Coupang</div><table><thead><tr><th>SKU</th><th>สินค้า</th><th class="right">ร้านอาหาร</th><th class="right">มาร์ท</th><th class="right">ยี่ปั๊ว</th></tr></thead><tbody>${state.products.map(p=>`<tr><td>${p.sku}</td><td><b>${p.name_th}</b><div class="muted">${p.name_kr} · ${p.weight_g}g</div></td><td class="right">${money(p.restaurant)}</td><td class="right">${money(p.mart)}</td><td class="right">${money(p.wholesale)}</td></tr>`).join('')}</tbody></table></section></div>`}
function dash(){const today=new Date().toISOString().slice(0,10); const t=state.orders.filter(o=>(o.created_at||'').slice(0,10)===today); const sales=t.reduce((s,o)=>s+Number(o.total||0),0); const unpaid=state.orders.filter(o=>!['ชำระแล้ว','ส่งแล้ว','ปิดงาน'].includes(o.status)).reduce((s,o)=>s+Number(o.total||0),0); return `<div class="grid three"><div class="card"><div class="muted">ยอดวันนี้</div><div class="big">${money(sales)}</div></div><div class="card"><div class="muted">ออเดอร์วันนี้</div><div class="big">${t.length}</div></div><div class="card"><div class="muted">ยอดค้าง</div><div class="big">${money(unpaid)}</div></div></div>`}
function settings(){return `<section class="card"><h2>ตั้งค่า Supabase</h2><label>SUPABASE URL</label><input id="sb_url" value="${state.config.url}"><label>ANON KEY</label><input id="sb_key" value="${state.config.key}"><div class="actions"><button class="btn dark" onclick="localStorage.sb_url=val('sb_url');localStorage.sb_key=val('sb_key');location.reload()">บันทึก</button><button class="btn ghost" onclick="exportData()">Export JSON</button></div><p class="muted">ถ้ายังไม่ใส่ Supabase ระบบจะเก็บข้อมูลในเครื่องก่อน</p></section>`}
function val(id){return document.getElementById(id).value.trim()}
function exportData(){const data=JSON.stringify({products:state.products,partners:state.partners,orders:state.orders},null,2); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([data],{type:'application/json'})); a.download='khokai-partner-pos-backup.json'; a.click()}
function printInvoice(id){const o=state.orders.find(x=>x.id===id); const w=window.open('','_blank'); w.document.write(`<html><head><title>${o.order_no}</title><style>body{font-family:sans-serif;padding:24px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #ddd;padding:10px;text-align:left}.right{text-align:right}h1{margin:0}</style></head><body><h1>ใบส่งของ KHOKAI</h1><p>${o.order_no}<br>${o.partner_name}<br>${new Date(o.created_at).toLocaleString('th-TH')}</p><table><tr><th>สินค้า</th><th class="right">จำนวน</th><th class="right">ราคา</th><th class="right">รวม</th></tr>${o.items.map(i=>`<tr><td>${i.name_th}<br><small>${i.sku}</small></td><td class="right">${i.qty}</td><td class="right">${money(i.price)}</td><td class="right">${money(i.qty*i.price)}</td></tr>`).join('')}<tr><th colspan="3" class="right">รวม</th><th class="right">${money(o.total)}</th></tr></table><br><br><p>ผู้รับสินค้า ____________________ วันที่ ____________</p><script>print()<\/script></body></html>`)}
syncLoad().then(render);
</script>
</body>
</html>
